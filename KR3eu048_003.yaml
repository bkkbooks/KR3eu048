body:
  text: 卷下桂枝體貫通而開發緩融宣暢為之用開發桂枝湯桂枝加厚朴杏仁湯桂枝加葛根湯桂枝二麻黃一湯桂枝麻黃各半湯桂枝二越婢一湯葛根湯麻黃楊小青龍湯大青龍湯柴胡桂枝湯開發表位也緩融柴胡桂枝幹薑湯緩融胸脅也黃連湯緩融胸腹也茯苓桂枝白朮甘草湯緩融心胸下也小建中湯桂枝加芍藥湯加芍藥加大黃湯緩融腹中也茯苓甘草湯當歸四逆湯當歸四逆加吳茱萸生薑湯緩融心胃間也桂枝人參湯緩融表裡也桃核承氣湯緩融血道也宣暢桂枝去芍藥湯桂枝去芍藥加附子湯新加湯桂枝加附子湯桂枝附子湯甘草附子湯宣暢表裡也五苓散宣暢肌肉間也桂枝加桂湯救逆湯茯苓桂枝甘草大棗湯桂枝甘草湯桂枝甘草龍骨牡蠣湯宣暢虛實間也按交趾為上東京廣東次之取味辛甘而香氣多者可任用蓋桂枝名枝條之皮也枝條之皮則薄薄者味必辛甘而香氣多身干之皮則厚厚者味必澀苦而香氣少此所謂肉桂也肉桂之劣於桂枝已甚葛根體摧折而弛張清解為之用弛張桂枝加葛根湯葛根湯葛根加半夏湯弛張表位也清解葛根黃芩黃連湯清解表裡也按當取入土深實大者破而日乾之而已不須蒸曝之制矣麻黃體疏漏而輕散清開為之用輕散麻黃湯桂枝麻黃各半湯桂枝二麻黃一湯桂枝二越婢一湯葛根湯小青龍湯大青龍湯輕散表位也麻黃附子細辛湯麻黃附子甘草湯輕散腹中也清開麻黃杏仁甘草石膏湯清開表裡也麻黃連軺赤小豆湯清開虛實間也按新莖肥滿青色微黃者為佳如其根節不堪任用和産無之本邦以密慈獨久薩充之者恐不是桔梗體固屈而排達為之用排達桔梗白散排達胸中也桔梗湯排達喉嚨也按今稱花壇者為勝其他待制造者總不備體用如華産氣味卻薄細辛體分披而消散追逐為之用消散小青龍湯消散表位及心下也追逐當歸四逆湯當歸四逆加吳茱萸生薑湯追逐心胃間也麻黃附子細辛湯追逐腹中也按小細柔直味極辛如嚼椒者佳本邦産形狀頗類杜衡雖然以其體用則充之細辛亦無害矣茵陳蒿體輕清而疏通為之用疏通茵陳蒿湯疏通虛實間也按喚葛窊刺欲木及者是也山野坡岸多有之陰乾用之連軺體發達而揚散為之用揚散麻黃連軺赤小豆湯揚散虛實間也按連軺亦作連苕本經云連翹根也又按實與根共均揚散之用也惟實則專揚散於外根則專揚散於內是為之小區別也秦皮體收澀而解散為之用解散白頭翁湯解散虛實間也按秦皮即秦樹皮也邦俗喚大葉篤涅栗谷者是也細葉者不足任用通草體疏達而通利為之用通利當歸四逆湯當歸四逆加吳茱萸生薑湯通利心胃間也按邦俗呼遏結弼者是也舶來通草多是葡萄藤不可不擇焉澤瀉體疏通而滲泄為之用滲泄五苓散滲泄肌肉間也豬苓湯滲泄虛實間也按華産為上吾邦仙台産次之新根肥大切之為片者可任用豬苓體輕舉而滲泄為之用滲泄五苓散滲泄肌肉間也豬苓湯滲泄虛實間也按皮面粗黑內白而輕舉者為佳近世本邦雖多出之體用大劣於華産蔥白體通氣而利達為之用利達白通湯白通加豬膽汁湯達利腹中也按莖大而色潔白新裁者堪用不俟陰乾等之制瓜蒂體疏泄而通越為之用通越瓜蒂散通越胸中也按瓜蒂即甜瓜蒂也須瓜既熟取其蒂自落用之本邦越州産最為上品旋覆花體徐回而注走為之用注走旋覆代赭石湯注走心下也按旋覆即金沸草邦俗呼屋孤兒末者是也單葉者可取以供用梓白皮體條理而利達為之用利達麻黃連軺赤小豆湯利達虛實間也按邦俗呼遏葛蔑葛失窊者是也生梓白皮者即謂臨用新取之也蓋葉亦其體為條理用則為發達也皮與葉異內外上下之用不可不辨焉竹葉體清亮而開達為之用開達竹葉石膏湯開達虛實間也按苦竹淡竹之二種可通用用時須撰取新葉不拘葉之大小厚薄也白頭翁體輕搖而疏利為之用疏利白頭翁湯疏利虛實間也按花葉莖根總合隱乾用之俗呼熱葛已速烏者是也舶來無之柴胡體融蕩而解散消化為之用解散小柴胡湯大柴胡湯柴胡加龍骨牡蠣湯柴胡加芒硝湯柴胡桂枝湯柴胡桂枝幹薑湯解散胸脅也消化四逆散消化心胃間也按須撰新産無蛀者本邦呼鎌倉産者勝諸品甘草體柔順而和緩融徹寬道為之用和緩桂枝湯桂枝加葛根湯桂枝加厚朴杏仁湯桂枝二麻黃一湯桂枝麻黃各半湯桂枝二越婢一湯葛根湯葛根加半夏湯麻黃湯小青龍湯大青龍湯和緩表位也小柴胡湯柴胡加龍骨牡蠣湯柴胡桂枝幹薑湯和緩胸脅也葛根黃芩黃連湯柴胡桂枝湯和緩表裡也芍藥甘草湯桂枝甘草湯竹葉石膏湯和緩虛實間也融徹半夏瀉心湯生薑瀉心湯甘草瀉心湯旋覆代赭石湯融徹心下也調胃承氣湯白虎湯白虎加人參湯融徹胃中也小建中湯桂枝加芍藥湯桂枝加芍藥加大黃湯新加湯麻黃附子甘草湯芍藥甘草附子湯茯苓四逆湯四逆湯通脈四逆湯通脈四逆加豬膽汁湯融徹腹中也梔子蘗皮湯融徹表裡間也桂枝加附子湯桂枝附子湯甘草附子湯桂枝人參湯融徹表裡也茯苓甘草湯融徹心胃間也桃核承氣湯融徹血道也桂枝去桂加茯苓白朮湯融徹心下也去桂枝加白朮湯四逆加人參湯理中丸融徹腹中也寬道甘草湯桔梗湯寬道喉嚨也梔子甘草豉湯寬道心胸也茯苓桂枝白朮甘草湯寬道心胸下也黃連湯寬道胸腹也桂枝去芍藥湯桂枝去芍藥加附子湯麻黃杏仁甘草石膏湯寬道表裡也厚朴生薑甘草半夏人參湯當歸四逆湯當歸四逆加吳茱萸生薑湯四逆散寬道心胃間也救逆湯桂枝加桂湯桂枝甘草龍骨牡蠣湯甘草乾薑湯黃芩湯麻黃連軺赤小豆湯茯苓桂枝甘草大棗湯寬道虛實間也按赤皮皴面切之斷理濃黃者為佳本邦移植華種者體用總不備矣白朮體條理而通利分別為之用通利五苓散通利肌肉間也桂枝去桂加茯苓白朮湯通利心下也去桂枝加白朮湯甘草附子湯通利腹中也分別茯苓桂枝白朮甘草湯分別心胸下也理中丸真武湯附子湯分別腹中也桂枝人參湯分別表裡間也按新根肥大切之白潤而有赤理者尤可矣近世如諸和産大失其體用蓋皆蒼朮之類乎矣芍藥體收斂而緩舒融蕩鎮固為之用緩舒桂枝湯桂枝加葛根湯桂枝加厚朴杏仁湯桂枝二麻黃一湯桂枝麻黃各半湯桂枝二越婢一湯葛根湯小青龍湯緩舒表位也柴胡桂枝湯緩舒表裡也芍藥甘草湯緩舒虛實間也融蕩大柴胡湯柴胡加芒硝湯融蕩胸脅也新加湯小建中湯桂枝加芍藥湯加芍藥加大黃湯芍藥甘草附子湯真武湯附子湯融蕩腹中也桂枝去桂加茯苓白朮湯融蕩心下也桂子加附子湯融蕩表裡也鎮固四逆散當歸四逆湯當歸四逆加吳茱萸生薑湯固鎮心胃間也桂枝加桂湯黃芩湯黃芩加半夏生薑湯黃連阿膠湯鎮固虛實間也按赤白無別華産為佳須擇無蛀者任用之本邦呼真芍藥者堪供其闕也半夏體運轉而啓開疏散為之用啓開苦酒湯啓開咽喉也葛根加半夏湯黃芩加半夏生薑湯啓開心胸也小青龍湯啓開表位及心下也疏散小柴胡湯柴胡加龍骨牡蠣湯大柴胡湯柴胡加芒硝湯疏散胸脅也厚朴生薑甘草半夏人參湯疏散心胃間也半夏瀉心湯生薑瀉心湯甘草瀉心湯旋覆代赭石湯小陷胸湯疏散心下也柴胡桂枝湯疏散表裡也黃連湯疏散胸腹也竹葉石膏湯疏散虛實間也按不拘粒之大小去粗皮而白潤者可任用本邦防州藝州産能愜之茯苓體通理而疏泄為之用疏泄五苓散疏泄肌肉間也桂枝去桂加茯苓白朮湯疏泄心下也茯苓桂枝白朮甘草湯疏泄心胸下也茯苓甘草湯疏泄心胃間也茯苓四逆湯真武湯附子湯疏泄腹中也茯苓桂枝甘草大棗湯豬苓湯疏泄虛實間也按本邦諸州所産皆可用大塊堅實白色帶淡赤者最佳黃芩體清爽而開達泄解為之用開達小柴胡湯柴胡加龍骨牡蠣湯大柴胡湯柴胡加芒硝湯柴胡桂枝幹薑湯開達胸脅也半夏瀉心湯生薑瀉心湯甘草瀉心湯開達心下也柴胡桂枝湯開達表裡也泄解葛根黃芩黃連湯泄解表裡也黃芩湯黃芩加半夏生薑湯乾薑黃連黃芩人參湯黃連阿膠湯泄解虛實間也按華産堅實皮薄色深黃微黑如有文理者良朝鮮産及坊間稱真黃芩者不足任用黃連體驅逐而沖排涼解為之用沖排半夏瀉心湯生薑瀉心湯甘草瀉心湯大黃黃連瀉心湯附子瀉心湯小陷胸湯沖排心下也黃連湯沖排胸腹也涼解葛根黃芩黃連湯涼解表裡也乾薑黃連黃芩人參湯白頭翁湯黃連阿膠湯涼解虛實間也按尚纖毛節高內堅實而色濃黃者稱加州産者殊勝諸品黃蘗體定固而壓逐為之用壓逐梔子蘗皮湯壓逐表裡間也白頭翁湯壓逐虛實間也按撰皮厚味極苦者為良本邦諸州産皆可任用呼吉窊達者是也浸炙等之制固不可從矣梔子體漸染而敞朗為之用敞朗梔子豉湯梔子生薑豉湯梔子甘草豉湯敞朗心胸也梔子蘗皮湯敞朗表裡間也梔子厚朴湯敞朗心胃間也梔子乾薑湯茵陳蒿湯敞朗虛實間也按和産堪任用能熟色赭紅者為良厚朴體排逐而降散為之用降散桂枝加厚朴杏仁湯降散表位也厚朴生薑甘草半夏人參湯梔子厚朴湯降散心胃間也大承氣湯小承氣湯降散胃中也按尚皮軟厚色深紫者坊間稱真厚朴者不足任用蜀漆體堅固而追逐為之用追逐救逆湯追逐虛實間也按根為常山苗莖為蜀漆邦俗曰孤薩吉者是也知母體輕清而散走為之用散走白虎湯白虎加人參湯散走胃中也按華産肥大輕虛多須者良吾邦移植華種者大劣矣栝蔞根及實根體潤和而散泄為之用實體散泄而潤和為之用散泄柴胡桂枝幹薑湯散泄胸脅也潤和小陷胸湯潤和心下也按吾邦所謂吉葛剌斯烏栗者是也根與王瓜易混又坊間呼玉章樣者非栝蔞實蓋王瓜實也不可混同當歸體柔沃而順寬為之用順寬當歸四逆湯當歸四逆加吳茱萸生薑湯順寬心胃間也按本邦伊吹山産可使用其他和州及仙台産氣味過厚而卻失柔沃之體人參體通暢而和逐融蕩為之用和逐小柴胡湯柴胡桂枝湯和逐胸脅也厚朴生薑甘草半夏人參湯和逐心胃間也黃連湯和逐胸腹也吳茱萸湯乾薑黃連黃芩人參湯竹葉石膏湯和逐虛實間也白虎加人參湯和逐胃中也融蕩半夏瀉心湯生薑瀉心湯甘草瀉心湯旋覆代赭石湯融蕩心下也新加湯桂枝人參湯融蕩表裡也理中丸茯苓四逆湯附子湯四逆加人參湯融蕩腹中也按人參品類太多僞贋亦不少朝鮮為上品廣東次之近世物産家以廣東人參為三七根其言昭亮余多年試用廣東和逐融蕩之功實出朝鮮之後故暫措其草形根狀之似與不似於彼而唯取其功用之不背於彼而已且若稱御種人參者及和産諸品或專苦味則無甘溫之態或專甘味則無苦平之態皆不足任用之矣附子體溫暖而升散振贍為之用升散桂枝加附子湯桂枝去芍藥加附子湯桂枝附子湯甘草附子湯升散表裡也附子瀉心湯升散心下也桂枝去桂加白朮湯麻黃附子細辛湯麻黃附子甘草湯升散腹中也振贍乾薑附子湯芍藥甘草附子湯茯苓四逆湯真武湯附子湯白通湯白通加豬膽汁湯四逆湯四逆加人參湯通脈四逆湯通脈四逆加豬膽汁湯振贍腹中也按豐實鎮重切之白色者為上品出於本邦奧州仙台及松前蝦夷者如其形狀則殆同於華産而於其效用則唯揚越嚴緊而大異於華産之沉重溫順蓋皆烏頭之類也乎不可混同焉近代唱古醫方者代附子以烏頭者往往有之此以不推其效用也不可從矣大黃體震蕩而放逐轉輸為之用放逐小承氣湯大承氣湯放逐胃中也大陷胸湯放逐胸中也桃核承氣湯抵當湯放逐血道也茵陳蒿湯放逐虛實間也轉輸大柴胡湯柴胡加芒硝湯轉輸胸脅也謂胃承氣湯轉輸胃中也大黃黃連瀉心湯附子瀉心湯轉輸心下也桂枝加芍藥加大黃湯轉輸腹中也按大塊鎮重柴地錦文者為佳坊間稱真大黃者功用大劣大戟體陵奪而瀉下為之用瀉下十棗湯瀉下心下及胸中也按根皮柔軟紫色銼之如束綿者為上品所謂紫大戟是也其他品類皆屬僞贋偶江州獅飛鄉及越前州所産足供其闕漏也甘遂體降散而瀉下為之用瀉下大陷胸湯瀉下胸中及心下也十棗湯瀉下心下及胸中也按白色堅實無蛀者可供使用本邦産體用都不備也芫花體馳突而瀉下為之用瀉下十棗湯瀉下心下及胸中也按芫花贋物最多以鼠麴草花僞之不可不辨矣其色漆紫四瓣抱以如丁香狀者是真物也可撰任用本邦呼膚𨴗木篤吉者形狀與真不異於其體用亦異矣可以陻其闕而已巴豆體燥熱而峻奔為之用峻奔桔梗白散峻奔胸中也按和産無之以新實者為良捶去殼直用不須用水酒醋油等之制及包紙為霜熬令黃黑之法大棗體和潤而緩通安定為之用緩通桂枝湯桂枝加葛根湯桂枝加厚朴杏仁湯桂枝二麻黃一湯桂枝麻黃各半湯桂枝二越婢一湯葛根湯葛根加半夏湯大青龍湯緩通表位也小柴胡湯大柴胡湯柴胡加芒硝湯緩通胸脅也十棗湯緩通心下及胸中也半夏瀉心湯生薑瀉心湯甘草瀉心湯旋覆代赭石湯桂枝去桂加茯苓白朮湯緩通心下也小建中湯桂枝加芍藥湯加芍藥加大黃湯去桂枝加白朮湯緩通腹中也柴胡桂枝湯新加湯桂枝加附子湯桂枝去芍藥湯去芍藥加附子湯桂枝附子湯緩通表裡也黃芩湯黃芩加半夏生薑湯麻黃連軺赤小豆湯緩通虛實間也吳茱萸湯當歸四逆湯當歸四逆加吳茱萸生薑湯緩通心胃間也黃連湯緩通胸腹也安定柴胡加龍骨牡蠣湯安定胸脅也救逆湯桂枝加桂湯茯桂甘棗湯安定虛實間也按取肥大核小能熟者而日乾而已不可用蒸煮等之制生薑體啓開而揚散排達疏通為之用揚散桂枝湯桂枝加葛根湯桂枝二越婢一湯桂枝二麻黃一湯桂枝麻黃各半湯葛根湯大青龍湯揚散表位也桂枝加附子湯桂枝附子湯新加湯桂枝去芍藥湯去芍藥加附子湯揚散表裡也排達桂枝加厚朴杏仁湯排達表位也葛根加半夏生薑湯黃芩加半夏生薑湯梔子生薑豉湯排達心胸也厚朴生薑甘草半夏人參湯當歸四逆加吳茱萸生薑湯吳茱萸湯排達心胃間也小柴胡湯柴胡加龍骨牡蠣湯大柴胡湯柴胡加芒硝湯排達胸脅也旋覆代赭石湯生薑瀉心湯排達心下也柴胡桂枝湯排達表裡也疏通桂枝去桂加茯苓白朮湯疏通心下也茯苓甘草湯疏通心胃間也救逆湯桂枝加桂湯麻黃連軺赤小豆湯疏通虛實間也桂枝加芍藥湯加芍藥加大黃湯小建中湯去桂枝加白朮湯真武湯疏通腹中也按撰新取而潤實者可供其用乾薑體披靡而消解溫散為之用消解小青龍湯消解表位及心下也柴胡桂枝幹薑湯消解胸脅也黃連湯消解胸腹也半夏瀉心湯甘草瀉心湯生薑瀉心湯消解心下也梔子乾薑湯乾薑黃連黃芩人參湯桃花湯消解虛實間也溫散甘草乾薑湯溫散虛實間也桂枝人參湯溫散表裡也理中丸茯苓四逆湯乾薑附子湯四逆湯四逆加人參湯白通湯白通加豬膽汁湯通脈四逆湯通脈四逆加豬膽汁湯溫散腹中也按作乾薑法取母姜大者淹米汁三日出切作錢片日乾不須用炮炒之制麥門冬體滋潤而優柔為之用優柔竹葉石膏湯優柔虛實間也按柔實圓大白色微黃有光滑者為勝本邦紀州産當其任稱鴉膚剌模者是也吳茱萸體穿突而消散為之用消散吳茱萸湯當歸四逆加吳茱萸生薑湯消散心胃間也按華産不陳久者佳本邦所産氣味過嚴刻矣五味子體發斂而潤澤為之用潤澤小青龍湯潤澤表位及心下也按以朝鮮産者為勝本邦呼薩涅葛資剌者所謂南五味子也殊為下品紀州産呼未資膚薩者所謂北五味子也雖然如其效用則都劣朝鮮産杏仁體滋潤而滑達為之用滑達桂枝二麻黃一湯桂枝麻黃各半湯麻黃湯大青龍湯桂枝加厚朴杏仁湯滑達表位也麻黃杏仁甘草石膏湯滑達表裡也麻黃連軺赤小豆湯滑達虛實間也按豐實圓大者為佳如其炒煮之制皆不可從桃仁體滋潤而淫泆為之用淫泆桃核承氣湯抵當湯淫泆血道也按諸桃核仁皆可用薄大而長其色潔白為之桃仁也與杏梅仁不可混同枳實體蕩推而疏通決泄為之用疏通梔子厚朴湯疏通心胃間也大柴胡湯柴胡加芒硝湯疏通胸脅也四逆散疏通虛實間也決泄小承氣湯大承氣湯決泄胃中也按漢産為良呼唐枳殼者是也不可鑿於殼實之異別也概稱實者為當也本邦産不備之體用且多僞贋如朝鮮産可供其闕也貝母體透徹而排達為之用排達桔梗白散排達胸中也按白潤肥大鎮重充實者為佳粳米體生育而中和為之用中和白虎湯白虎加人參湯中和胃中也桃花湯竹葉石膏湯中和虛實間也按粳米有早中晚三收供藥用者以晚粳歷一周年者為可赤小豆體緩紓而遷轉為之用遷轉瓜蒂散遷轉胸中也麻黃連軺赤小豆湯遷轉虛實間也按小粒而色濃赤帶微黑色不陳久者為佳香豉體和通而疏洗為之用疏洗梔子豉湯梔子甘草豉湯梔子生薑豉湯疏洗心胸也瓜蒂散疏洗胸中也按豉有咸豉淡豉二種咸豉備食用淡豉供藥用造淡豉法以黃大豆為黃蒸取出苞藁候溫處幽之凡三日須白衣遍生為準曬乾充其用膠飴體和潤而弛緩為之用弛緩小建中湯弛緩腹中也按麥蘗粳米相合敖煎而造者可矣苦酒體嚴緊而衝突為之用衝突苦酒湯衝突咽喉也按苦酒即醋謂米醋也水蛭體穿窬而敗壞為之用敗壞抵當湯敗壞血道也按本邦呼谷非兒者是也夏月取之但暴乾耳不須以冬豬脂煎令焦黃及以微火炒等之制虻蟲體銷鑠而敗壞為之用敗壞抵當湯敗壞血道也按夏月取之但暴乾翅足全用又不用炒熟等之制矣邦俗呼喚遏屋遏膚者是也蜜體濡澤而融緩為之用融緩蜜煎導融緩便道也豬膚湯融緩上焦也接蜜即蜂蜜也有以砂糖造者可擇而使用豬膚體滋潤而舒暢為之用舒暢豬膚湯舒暢上焦也按膚肌膚之膚而謂皮內之薄皮也豬膽體排通而滋潤為之用滋潤白通加豬膽汁湯通脈四逆加豬膽汁湯滋潤腹中也按論中曰豬膽汁者取用生膽絞汁之謂也蓋我邦不畜豬故膽亦難得偶貯藥肆者皆干膽而已以是今用之也須直取干膽銼細與諸藥煮用阿膠體潤道而緩舒為之用緩舒豬苓湯黃連阿膠湯緩舒虛實間也按阿膠漢制有數品坊間所謂算木樣及硯樣者佳本邦阿膠製法不整不堪藥用雞子體溫潤而白以紓散為之用黃以疏通為之用紓散苦酒湯紓散咽喉也疏通黃連阿膠湯疏通虛實間也按雞子即雞卵也不拘卵之大小取新生者可供其用人尿體滋潤而降伏為之用降伏白通加豬膽汁湯降伏腹中也按幼男者為佳不可用經日者須臨用新取之石膏體清涼而冷解銷沉為之用冷解桂枝二越婢一湯大青龍湯冷解表也白虎湯白虎加人參湯冷解胃也銷沉麻黃杏仁甘草石膏湯銷沉表裡也竹葉石膏湯銷沉虛實間也按細理白澤錘之條分區別者為上品堅硬而其色黯淡或微黃者不可必任矣吾邦所産體用都不備矣芒硝體消化而傾放為之用傾放柴胡加芒硝湯傾放胸脅也大陷胸湯傾放胸中也桃核承氣湯傾放血道也調胃承氣湯大承氣湯傾放胃中也按芒硝即煮朴消而取結芒芽者用之舶來多僞不如取所謂灰芒硝者自制之滑石體鎮重而滑達為之用滑達豬苓湯滑達虛實間也按白色如凝脂極軟者為佳所謂水飛滑石者殆脫滑膩不可供藥用代赭石體沉墜而啓達為之用啓達旋覆代赭石湯啓達下心也按其色濃紫擲之為金聲者為佳赤石脂體收藏而分理為之用分理赤石脂禹餘糧湯桃花湯分理虛實間也按其色如桃花有液澤捫之則印指文者為上品龍骨體鎮固而沉墜為之用沉墜柴胡加龍骨牡蠣湯沉墜胸脅也救逆湯桂枝甘草龍骨牡蠣湯沉墜虛實間也按本草匯言曰出於晉蜀山谷者或是矣乎蓋以形容如奇骨有龍骨之名也其色潔白輕虛而軟有一條竅者最為上品近世海舶載來者殊為下品不堪使用本經謂死龍之骨時珍從之陶弘景謂蛻化之骨李肇謂大魚之骨後之說龍骨者爭訟紛紜固有以乎哉牡蠣體湮沒而消滅為之用消滅柴胡桂枝幹薑湯柴胡加龍骨牡蠣湯消滅胸脅也救逆湯桂枝甘草龍骨牡蠣湯消滅虛實間也按不拘殼之大小須泥固燒使色潔白而已其他製造都不可從矣禹餘糧體導理而疏通為之用疏通赤石脂禹餘糧湯疏通虛實間也按尚紫赤細粉本邦諸州所産不若舶來佳
