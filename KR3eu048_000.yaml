body:
  text: 跋詩云有物有則蓋體用之謂矣乎夫有物必有則有體必有用體用立矣而後事成也古醫之術其要亦在於此而李唐以來或不本之後學之徒誤其所方先生嘗病之也故有是舉乃其辨之精其論之審凡誠意於古者讀之必將有即得焉直之不敏與亦有聞因言其所以弘之以附其末丁巳春三月南越醫員妻木直撰
