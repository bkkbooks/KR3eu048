body:
  text: 卷上總論凡說藥品昉於神農本草中於李當之陶弘景下則及於唐宋元明諸家本草品物至千有餘數而其說縱橫百出矣然則措焉不論乎曰否凡極事物之理雖尚至廣至遠而唯驅廣遠而不知約之則事而無不惑焉物而無不疑焉夫疾病之狀態雖不一而均於傷其常則一也以是乎備其品物也不可不先約之施用而推弘其才能矣但設千有餘數之藥品而不為推弘之才能則不素生疑惑而已不能必療其疾病也夫穀肉果菜鳥獸鱗介者皆養人之常者也然其要在於節之矣豈謂盡舉穀肉果菜鳥獸鱗介之數而不食之則不能養人之常而遂不知節之則不素無益而已恐傷其常也故藥品可約而得以療其疾病焉穀肉果菜鳥獸鱗介可節而得以養其平常焉李時珍於本草綱目品物益多多而說其主治也亦彌紛冗請舉其一言之凡諸藥方有五甘草者則盡取其證候而以歸之於甘草一品之能其他數類亦皆無不然矣果其說之是乎既足以一品普治衆病也何俟品物千有餘數而後療其疾病乎嗟乎其言之矛盾如是甚矣殆不知所適從矣所謂唯驅廣遠而不知約之者也藥品不可不約以療其疾病主治不可不統以取其要此余之所以著傷寒用藥研究也於傷寒用藥研究之撰就品物千有餘數之中約取其一百五十品次主治之十百而先品物之體與用也蓋體也者大體也蔽一品之能之謂也用也者活用也數味相據而為效用之謂也按古人亦有言體用者雖然充其體以氣味充其用以效用故體用畫其域而為兩斷也余意則不然夫體用者猶經緯然矣體以貫用用則出於體經以貫緯緯則繫於經體用經緯其義之似也如此然則體與用統一於效用而言之也豈為配氣味與效用乎不可不考焉或曰吾子鑿鑿乎論體用之異同雖然尚效之於古而以氣味與效用亦無害而已何則氣之於寒熱溫涼平味之於甘苦辛酸鹹淡澀斂皆自然之性也品物之用無一不出於自然之性矣夫既性以出用則氣味與效用固一其歸豈兩斷乎哉如吾子之言可謂勉而好違古曰不然矣體用者皆以藥之才能言之也氣味者藥之性而非才能也譬之音與藥則音者體也樂者用也夫蓋音之性金石絲竹匏土革木也樂之性乃音之相和也是雖異其性而於有其聲之可聽則音樂同一矣然則聲者音樂之才能而非性也故藥之才能猶音樂之於聲也豈以氣味與效用得充體用乎哉曰體用之具品物既受教雖然令驅使品物也問主治於脈證則歷然而有形以品物之體用而臨脈證則泛然無形有形則事順無形則事不順吾子復有說乎曰有夫脈證之雖有形而不辨虛實之分界則不能察主客之疑似也不察主客之疑似而漫從有形於外則至處其方也必違矣可謂有形之歸無形也以是乎欲知虛實之分界則不可不察主客之疑似也蓋察主客之疑似者在推脈證於內而究其本源也夫脈證之於本源皆在於血液神氣之失常也故脈證者量血液神氣之標也既知血液神氣之如何而以體用蔽之則本源復而其標從矣譬如破竹乎刃觸其端則末自分離矣不可不考焉其二宋元以降醫家者流忸汰陰陽配當五行生剋之理滔滔乎疾醫之道遂不講也既已久矣以是乎近世唱古醫方者皆惡說理而唯取外脈證焉不為推脈證之源始乃修飾之各以其家言曰或氣或毒或水或寒皆牽強己之所癖而決乎不顧矣嗟嘆是何偏乎惡說理而頗乎建家言也可謂惡陷阱而被杖者也且其言曰隨脈證治之是千古之哲論萬代之龜鑑矣是於其言似則似矣而未可許以善矣論曰觀其脈注知犯何逆隨證治之此言推窮其脈證之出於何逆則自足辨於證之主客主客既辨則棄之客證而隨之主證也何為以唯隨外脈證焉盡而不殘哉故處方之要雖固在於脈證而不窮其所源始則脈證亦不可從焉試舉脈之不可從者言之如桂枝湯曰脈洪大大青龍湯曰脈浮緩茯苓桂枝白朮甘草湯曰脈沉緊建中湯曰陰脈弦小柴胡湯曰陽脈澀瓜蒂散曰脈微浮大承氣湯曰脈遲又曰脈弦豬苓湯曰脈浮四逆湯曰脈浮而遲當歸四逆湯曰脈細欲絶則不皆推其所源始則脈與方大不相愜者也此豈得但隨脈而治之乎哉試舉證之不可從者言之如大青龍湯曰身不疼但重乍有輕時桂枝湯曰時發熱自汗出而不愈者承氣湯曰頭痛有熱者厚朴生薑甘草半夏人參湯曰腹脹滿者茯苓桂枝甘草大棗湯曰臍下悸者真武湯曰仍發熱四逆湯曰發熱頭痛小柴胡湯曰身熱惡風頸項強又曰腹中急痛小建中湯曰心中悸而煩者大柴胡湯曰鬱郁微煩柴胡加芒硝湯曰日晡所發潮熱已而微利柴胡加龍骨牡蠣湯曰讝語一身盡重不可轉側者桂枝甘草龍骨牡蠣湯曰煩躁者大陷胸湯曰不大便五六日舌上燥而渴日晡所小有潮熱自心下至少腹硬滿而痛不可近者柴胡桂枝湯曰支節煩疼心下支結甘草瀉心湯曰下利日數十行穀不化赤石脂禹餘糧湯曰心下痞硬旋覆代赭石湯曰心下痞硬桂枝人參湯曰心下痞硬大柴胡湯曰心下痞硬白虎加人參湯曰時時惡風又曰背微惡寒調胃承氣湯曰不吐不下心煩者豬苓湯曰發熱渴欲飲水小柴胡湯曰發潮熱大便溏大承氣湯曰小便不利大便乍難乍易時有微熱又曰發熱汗多者麻黃附子細辛湯曰始得之反發熱附子湯曰口中和其背惡寒者吳茱萸湯曰吐利手足厥冷煩躁欲死者四逆散曰四逆大承氣湯曰自利清水白虎湯曰脈滑而厥者當歸四逆湯曰手足厥寒茯苓甘草湯曰厥而心下悸者乾薑黃連黃芩人參湯曰本自寒下白頭翁湯曰熱利下重小承氣湯曰下利讝語者小柴胡湯曰差已後更發熱者則不皆推其所源始則證與方大不相愜者也此豈得但隨證而治之乎哉以是乎脈證之源始不可不推以窮極矣脈證之源始既明而處方可得施焉處方之先務在於辨品物之體用體用既明而處方從焉其三傷寒之於論也辭簡旨深唯標其要語耳矣疾病之與人活本末主客輕重變化入機而出機豈盡之於筆舌之間哉將使讀者沈研感刻思而得之也故其學之也猶習劍法乎彼我互對場而至決其雌雄則雖固無暇以其法而平常習法之熟者無不必得勝利矣傷寒之於論也曲盡圓熟則至療其疾病也機用備焉神妙出焉曲盡圓熟之有道矣先推脈證之本源於內而辨識其病位則縱令脈證同態奚眩曜乎曰究極脈證之本源也者何曰推之於內而不眩曜於脈證之同態也今舉脈之同態者言之則桂枝湯曰脈洪大白虎湯亦曰脈洪大不可不分別矣蓋於桂枝湯則以初發汗之過於法其邪氣盡揚越於太表而尚未解一時使脈洪大者也故於其洪大必無根柢者也於白虎湯則邪氣已陷一身其勢跋扈於表裡使脈洪大者也故於其洪大必有力又有根柢者也雖均一於洪大之字而推之內而極其本源則果有其別也如此矣其他論中標脈者亦皆無不然矣不可不推知焉又舉證之同態者言之則少陽之熱內結於心下而為痞硬此為之半夏瀉心湯也生薑瀉心湯甘草瀉心湯屬焉下焦畜水氣不和之氣遂犯於心下而為痞硬此為之赤石脂禹餘糧湯也病新解後以活氣弛乃釀成痰飲於心下而為痞硬此為之旋覆代赭石湯也表裡有邪氣其勢交會心下而為痞硬此為之桂枝人參湯也病雖尚在於少陽而其勢將轉於胃乃迫心下而為痞硬此為之大柴胡湯也是雖皆均為心下痞硬而推之內而極其本源則果有其別也如此矣其他論中論證者亦皆無不然矣不可不推知焉是故脈證之雖不可緩而不推極之本源但拘泥其脈證則脈證亦何益乎其要在推之於內而先辨其病位也病位既辨而脈證之正變主客彰然矣於是乎處方之意初一矣其四夫人之所以立者無他以血液宣布神氣運行也是為之其常也若乃當其有邪氣也血液為之失其常度神氣為之紊其機用於是乎脈證出焉脈證也者有形之者也邪氣也者無形之者也無形之克生有形者蓋邪氣之在於人身乎即以血液神氣為其態故也是故脈證者不止出於邪氣而已血液神氣亦職之由矣然則於治療之道可推脈證於內而索血液神氣之如何而後以之治法矣是為之醫之先務也若其血液神氣之於其常也非固草水蟲石之所與而但穀肉果菜得以養之也若其血液神氣之為邪氣失其常也非固穀肉果菜之所與而但草木蟲石得以復之也本論諸篇如所論之脈證皆推究之於內則無不惑於血液凝結或於血液偏滿或於血液虛耗又或乘乎神氣之怠慢或乘乎神氣之微乏或乘乎神氣之不旺也夫然故血液神氣之既神仙靈妙於往日亦以為邪氣魑魅魍魎於今日是故於治療之道也可推脈證於內而索夫血液神氣之為魑魅魍魎者而以施其治法耳矣且夫藥有剛柔升降疏密開閉干潤散收之宜可擇以制夫血液神氣之為魑魅魍魎者而使之復其常度使之振其機用矣既如此則邪氣何為得淹留矣哉猶大海之不承塵芥然矣於是乎處其方劑也先識於血液神氣之如何而後足漸辨脈證之正變主客也此余之所以先於病之源始而後於脈證也雖然不既明脈證則亦不能度量血液神氣矣豈敢忽脈證矣哉豈敢忽脈證矣哉其五病有表裡內外之分矣藥無表裡內外之別矣凡藥之入腹中也即就病之所在而以為之位者也於是能得其肯綮乎乃立之功績其相戾乎乃為反逆者也豈藥得固有表裡內外之別而獨期其所之乎哉夫人身之有病也猶河海之浮船乎病非人身之所固有也船亦非河海之所固有也乃其水之積厚乎其力無勞乎負船船必能濟焉精之最健乎其勢亦無勞乎逐病病必揚越焉若夫水之積既薄也何勝負船船恐委於泥沙焉精之既衰也亦何勝逐病病或沉滯於重地焉於是乎船加之以順風則如之何蓋病之得治方其猶船之於順風乎矣船得順風而焉無不能濟矣病得治方而亦焉無不愈矣苟藥之反於病也亦猶船之於逆風也病乎不得不必至篤危矣船乎不得不必為破毀矣且夫風有西東南北之宜藥有峻劇平易之宜風得船而厲其勢藥待病而見其力不得風之宜則奈船何不得藥之宜則奈病何是故凡藥之入腹中也固無表裡內外之別即就病之所在而以為之位者也豈獨期其所之乎哉氣氣者機也機發神妙此謂之氣也夫人身之有氣也有先天后天之分不可不辨焉蓋以先天言之則指出於天元之一氣故曰之元氣也以後天言之則指歷乳汁穀肉之養故曰之精氣也是故元氣精氣固同一而唯其所指之別而已後世論氣極多端曰宗氣曰神氣曰大氣雖然要之皆不出元氣精氣之外者也於是乎知元氣精氣之可謂而諸氣之不可謂也故論中單曰氣者皆指精氣言之也如曰其氣上衝曰氣上衝胸曰氣上衝咽喉曰少氣曰氣上撞心曰氣逆欲吐者是也時又有冠氣以物者此皆指其機發言之也如曰胃氣不和曰心下有水氣曰噫氣不除曰胃中有邪氣曰腹中轉矢氣者是也豈但是而已哉凡以氣屬天地之動物則唯彌其機發之義也所謂如天氣地氣然矣其他萬物亦皆無不然矣是故今但就人身單曰氣則精氣之氣也冠氣或以胃或以水或以噫或以邪或以矢則皆指其機發之謂也然則氣之雖一而因所其指異其意義豈可混同乎詳說見於脈證式正邪正氣者天地四時之氣也此氣克養萬物亦克傷矣然則氣候之於萬物也順而養逆而傷乎曰不然順逆相據為養順逆相與亦為傷故順逆者可與謂正氣而不以配正邪若夫於天地之間也苟有邪氣而流行乎何不使萬物盡病且斃矣乎觀於前有罹病者後有在常者右有斃者左有生者亙往古晚近而不改其政令則豈天地之間得別有邪氣哉唯天地之正氣為然矣蓋邪氣者俟人之彌也故正氣犯人則初現其態者也凡人之於體也精氣貫通血液宣布苟無一點之虧隙此為之其常也既如此則縱令其氣候逆奚得傷之矣乎而況於氣候之順乎必無害守其常也若夫人之於體也雖固無病而衣食之不適情欲之不從勞逸之不節則不能不為一時之虛一時之不足也既如此則縱令其氣候順奚得守其常矣乎而況於氣候之逆乎必不得不被傷也於是乎病與不病我自取焉豈強之天地四時之氣候之為哉古語曰邪氣乘虛入此即名字人之疾病而曰邪氣者也奚外人身言之乎後世不辨此義論邪氣必於天地四時復必於人之疾病也以是受病之原昏懵而可不知焉癖或胚胎於茲嗟嘆悲哉虛實虛也者精氣之虛也實也者邪氣之實也故虛則初於實而實則生於虛以是乎有實則有虛有虛必有實實待虛而彌實虛待實而益虛實與虛其不相離也如此矣雖然於疾醫之道先立之標而不期其方隅則術無所從矣於是乎其實之益實則雖不能無虛而單曰實其虛之益虛則雖不能無實而單曰虛此欲期其方隅也然則實有本末虛有首尾實之為實獨在其本而不在其末以末之專於虛也虛之為虛獨在其尾而不在其首以首之專於實也此所以虛實之兩隅互相待者而歸之一隅而單曰實單曰虛也虛實之義既明而陰陽定矣故虛實者陰陽之原也陰陽陰陽者內外之名而顯隱之義也夫邪氣之傷人身其狀態千差萬別雖固不可窮極而統以陽與陰系以合併或虛實間往乎來乎不得必離於此等之位焉蓋邪氣雖一而各殊異其狀態者不惟於邪氣之輕重而已精虛之多少尤與矣於是乎實之據虛則邪氣雖盛而精尚有所振矣故病顯著於外此呼之陽也虛之據實則精氣已受敗邪氣自旺矣故病隱晦於內此呼之陰也陽之繫於外陰之藏於內其義詳悉而未見其狀態狀態之可見於外者為寒熱也寒熱寒熱者邪氣之狀態也正氣勝於邪氣則以熱為其候也邪氣勝於正氣則以寒為其候也寒之狀態初於惡寒而終手足厥寒厥逆也熱之狀態初於發熱而終外熱也是故寒則以其終為本色焉熱則以其始為本色焉寒之於發熱惡寒也是為之標也寒之於手足厥寒厥逆也是為之本也何則以寒之專於虛地也熱之於發熱也是為之本也熱之於外熱也是為之標也何則以熱之專於實地也夫既雖熱之在實地而有其標及虛地者雖寒之在虛地而有其標及實地者然則熱而有虛實寒而有虛實虛實寒熱如擾亂然矣於是乎拆半寒熱虛實呼熱之專於實地者曰陽呼寒之專於虛地者曰陰可知熱之在陽位寒之在陰位也是故寒熱者陰陽之候法也虛實間夫熱之因於陽與實寒之因於陰與虛不能無淺深輕重之別矣於是乎有三陽三陰之分也太陰為表以肌肉間為其位也少陽為表裡間以心胸為其位也陽明為里以胃之內郭為其位也如三陰亦皆為之裡也而太陰位於胃內之上口少陰位於胃內之中央厥陰位於胃內之下尾故如陽明太陰少陰厥陰則雖有區別而均是皆里也如少陽則以間於表裡前顧太陽之表後臨陽明與太陰之裡者也故少陽之轉於陽明者不俟論焉而又時有轉於太陰者也夫蓋少陽之邪彌益實之勢則轉於陽明也此為之其常也故其轉也迅速而必無躊蹰於其中間者矣少陽之邪既交精之虛則轉於太陰也此為之非常也故其轉也緩慢而必有躊蹰於其中間者矣於是乎無論有少陽之轉於太陰者或有少陽之證未解已交於太陰之證者此為之少陽太陰之並病也或有既去少陽之位地而未及太陰之位地惟在其中間而虛實均待而為脈證者此為之虛實之間位也此於其虛實之間位也不唯出於少陽而入於太陰而已又有出於太陰而入於少陽者也何則於是位也以雖有精虛而未專見虛候雖有邪實未專見實候也故其實之終駸乎必見虛候矣乃為之太陰病也其虛之漸復乎必見實候矣乃為之少陽病也虛實間之於少陽太陰也為殊易混淆矣不可不慎以稽之脈證也曰然則本論何不設虛實間之一篇使讀者別知有此位地乎曰本論既張虛實間之一篇則判然嫌於與三陽三陰為對應也此於是位也殊不然矣不歸少陽則必轉於太陰不轉太陰則必歸於少陽唯始終於其中間者也豈若三陽三陰之轉機縱橫不可期者矣此本論所以不設虛實間之篇也且夫於各位之間亦皆不能無間位也雖然以虛實互偏乃留連於各位之間者尤寡矣倘其留連者亦不得不迅速其轉遷矣如虛實間之位則以間表裡陰陽亙虛實兩端為其部位也太甚廣矣而於其脈證亦不一定而止焉不可不論焉本論少陽太陰接其篇者欲示此等之義也不可不稽矣方位夫醫之驅使藥方不可不漁獵於泛濫雖然不辨其部位但驅其泛濫則見而無不理與而無不善此術之所以為拙也以是先辨其部位而一必顧於茲十亦顧於茲則十而如一一果應十縱橫無盡不惑其泛濫方意明瞭而其用不違藥方之部位不可不辨故今序其方位如下桂枝湯桂枝加葛根湯桂枝加厚朴杏仁湯桂枝麻黃各半湯桂枝二麻黃一湯桂枝二越婢一湯葛根湯葛根加半夏湯麻黃湯大青龍湯小青龍湯上十一方為太陽部位之方也葛根黃芩黃連湯柴胡桂枝湯上二方為太陽少陽間之方也麻黃杏仁甘草石膏湯上一方為太陽陽明間之方也桂枝加附子湯桂枝去芍藥加附子湯上二方為太陽少陰間之方也小柴胡湯柴胡加龍骨牡蠣湯大柴胡湯柴胡加芒硝湯柴胡桂枝幹薑湯上五方為少陽正位之方也茯苓桂枝白朮甘草湯五苓散梔子豉湯梔子甘草豉湯梔子生薑豉湯大陷胸湯小陷胸湯白散半夏瀉心湯十棗湯大黃黃連瀉心湯生薑瀉心湯甘草瀉心湯瓜蒂散黃連湯梔子蘗皮湯上十六方為少陽變位之方也調胃承氣湯白虎湯白虎加人參湯小承氣湯大承氣湯上五方為陽明部位之方也乾薑甘草湯芍藥甘草湯桂枝芍藥湯桂枝去桂加茯苓白朮湯桂枝甘草湯茯苓桂枝甘草大棗湯厚朴生薑甘草半夏人參湯茯苓甘草湯梔子厚朴湯梔子乾薑湯桃核承氣湯救逆湯桂枝加桂湯桂枝甘草龍骨牡蠣湯抵當湯附子瀉心湯赤石脂禹餘糧湯旋覆代赭石湯桂枝人參湯黃芩湯黃芩加半夏生薑湯桂枝附子湯甘草附子湯豬苓湯蜜煎導茵陳蒿湯吳茱萸湯豬膚湯麻黃連軺赤小豆湯桂枝加芍藥大黃湯黃連阿膠湯桃花湯甘草湯桔梗湯苦酒湯四逆散當歸四逆湯當歸四逆加吳茱萸生薑湯乾薑黃連黃芩人參湯白頭翁湯竹葉石膏湯上四十一方為虛實間之方也新加湯小建中湯桂枝加芍藥湯理中丸上四方為太陰部位之方也乾薑附子湯芍藥甘草附子湯茯苓四逆湯真武湯桂枝附子去桂枝加白朮湯麻黃附子細辛湯麻黃附子甘草湯附子湯白通湯白通加豬膽汁湯上十方為少陰部位之方也四逆湯四逆加人參湯通脈四逆湯通脈四逆加豬膽汁湯上四方為厥陰部位之方也通計一百一方傷寒論之舊方也禹餘糧丸上方法闕故省之抵當丸大陷胸丸文蛤散炙甘草湯土瓜根方豬膽汁方麻仁丸半夏散烏梅丸麻黃升麻湯燒裩散枳實梔子湯牡蠣澤瀉散上十三方證方不穩當手段或出於怪異恐後人之補入故亦暫省而俟後考
